{% extends "base.html" %}

{% block titulo %}Contacto — {{ sitio.nombre_sitio }}{% endblock %}

{% block contenido %}
<section class="seccion-proyectos">
    <h2>Contacto</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem; text-align: center;">¿Tienes un proyecto en mente? Escríbeme.</p>

    <div class="form-section">
        <form method="post"
              hx-post="{% url 'contacto' %}"
              hx-target="#form-result"
              hx-swap="innerHTML">
            {% csrf_token %}
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" required></textarea>
            </div>
            <button type="submit" class="btn">Enviar</button>
        </form>

        <div id="form-result" style="margin-top: 1rem;"></div>
    </div>
</section>
{% endblock %}
